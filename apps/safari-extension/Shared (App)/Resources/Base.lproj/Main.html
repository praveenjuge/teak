<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" href="../Style.css">
    <script src="../Script.js" defer></script>
</head>
<body>
    <main class="shell">
        <img class="app-icon" src="../Icon.png" width="64" height="64" alt="Teak">

        <section class="intro">
            <h1>Teak for Safari</h1>
        </section>

        <section class="account" aria-live="polite">
            <p class="account-status" id="account-status">Checking account...</p>
            <div class="actions">
                <button class="primary" id="sign-in" type="button">Sign in</button>
                <button class="secondary" id="sign-out" type="button">Sign out</button>
                <button class="secondary platform-mac" id="open-preferences" type="button">Open Safari Settings</button>
            </div>
        </section>
    </main>
</body>
</html>
