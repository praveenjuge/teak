<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <main class="popup">
        <img src="images/toolbar-icon.svg" width="28" height="28" alt="Teak">
        <p class="title" id="title">Teak for Safari</p>
        <p class="message" id="message">Checking Safari...</p>
        <div class="actions" id="actions">
            <button class="primary" id="sign-in" type="button">Sign in</button>
            <button class="secondary" id="retry" type="button">Try again</button>
            <button class="secondary" id="sign-out" type="button">Sign out</button>
        </div>
    </main>
</body>
</html>
