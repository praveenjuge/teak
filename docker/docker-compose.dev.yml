services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: teak_user
      POSTGRES_PASSWORD: teak_password
      POSTGRES_DB: teak_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teak_user -d teak_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Development Server
  backend:
    image: oven/bun
    working_dir: /workspace/backend
    environment:
      - POSTGRES_DB=teak_db
      - POSTGRES_USER=teak_user
      - POSTGRES_PASSWORD=teak_password
      - BETTER_AUTH_SECRET=dev-secret-key-change-in-production
      - BETTER_AUTH_URL=http://localhost:3001
    volumes:
      - ../:/workspace
      - backend_node_modules:/workspace/backend/node_modules
      - data_dev_storage:/data
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    command: sh -c "cd /workspace && bun install && cd /workspace/backend && echo 'Waiting for database...' && sleep 5 && echo 'Running migrations...' && bun run db:migrate && echo 'Starting development server...' && bun run db:seed && bun run dev"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/api/health",
        ]
      interval: 30s
      timeout: 30s
      retries: 2

  # Frontend Development Server
  frontend:
    image: oven/bun
    working_dir: /workspace/apps/web
    volumes:
      - ../:/workspace
      - frontend_node_modules:/workspace/apps/web/node_modules
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: sh -c "cd /workspace && bun install && cd /workspace/apps/web && bun run dev --host 0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Volumes
volumes:
  postgres_dev_data:
    driver: local
  data_dev_storage:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
