services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: teak_user
      POSTGRES_PASSWORD: teak_password
      POSTGRES_DB: teak_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - teak-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teak_user -d teak_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5433:5432" # Different port to avoid conflicts with existing PostgreSQL

  # Backend Development Server
  backend:
    image: oven/bun
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://teak_user:teak_password@db:5432/teak_db
      - BETTER_AUTH_SECRET=dev-secret-key-change-in-production
      - BETTER_AUTH_URL=http://localhost:3001
      - UPLOAD_PATH=/app/uploads
    volumes:
      - ../backend:/app
      - backend_node_modules:/app/node_modules
      - uploads_dev_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - teak-dev-network
    restart: unless-stopped
    ports:
      - "3001:3001"
    command: sh -c "bun install && echo 'Waiting for database...' && sleep 5 && echo 'Running migrations...' && bun run db:migrate && echo 'Starting development server...' && bun run db:seed && bun run dev"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/api/health",
        ]
      interval: 30s
      timeout: 30s
      retries: 2
      start_period: 60s

  # Frontend Development Server
  frontend:
    image: oven/bun
    working_dir: /app
    volumes:
      - ../apps/web:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - teak-dev-network
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Networks
networks:
  teak-dev-network:
    driver: bridge

# Volumes
volumes:
  postgres_dev_data:
    driver: local
  uploads_dev_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
