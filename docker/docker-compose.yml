services:
  # Teak Application (Single Image)
  teak:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - PORT=80
      - BACKEND_PORT=3001
      - DATABASE_URL=postgresql://teak_user:teak_password@db:5432/teak_db
      - BETTER_AUTH_SECRET=your-super-secret-key-change-this-in-production
      - BETTER_AUTH_URL=http://localhost:80
      - UPLOAD_PATH=/app/uploads
      # Optional S3 Configuration (remove AWS_ prefix to use local storage)
      # - AWS_S3_BUCKET=your-bucket-name
      # - AWS_S3_REGION=us-east-1
      # - AWS_S3_ENDPOINT=https://s3.amazonaws.com
      # - AWS_ACCESS_KEY_ID=your-access-key
      # - AWS_SECRET_ACCESS_KEY=your-secret-key
      # - AWS_S3_FORCE_PATH_STYLE=false
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - teak-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: teak_user
      POSTGRES_PASSWORD: teak_password
      POSTGRES_DB: teak_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teak-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teak_user -d teak_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"  # Optional: Remove in production for security

# Networks
networks:
  teak-network:
    driver: bridge

# Volumes
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local