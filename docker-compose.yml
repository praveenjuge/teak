services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teak
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
    restart: unless-stopped
    networks:
      - teak-network

  # Optional: Add a reverse proxy like nginx if needed
  # nginx:
  #   image: nginx:alpine
  #   container_name: teak-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - teak
  #   networks:
  #     - teak-network

networks:
  teak-network:
    driver: bridge
# Optional: Add volumes for persistent data
# volumes:
#   teak-data:
