name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Desktop release tag (for example v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos:
    name: Build + Release macOS (Apple Silicon)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Validate desktop manifest versions
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_VERSION="${{ steps.release.outputs.version }}"
          PACKAGE_VERSION="$(jq -r '.version' apps/desktop/package.json)"
          TAURI_VERSION="$(jq -r '.version' apps/desktop/src-tauri/tauri.conf.json)"
          CARGO_VERSION="$(awk '/^\[package\]/{in_package=1} in_package && /^version\s*=/{gsub(/\"/, "", $3); print $3; exit}' apps/desktop/src-tauri/Cargo.toml)"

          if [[ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "apps/desktop/package.json version mismatch: $PACKAGE_VERSION != $EXPECTED_VERSION"
            exit 1
          fi

          if [[ "$TAURI_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "apps/desktop/src-tauri/tauri.conf.json version mismatch: $TAURI_VERSION != $EXPECTED_VERSION"
            exit 1
          fi

          if [[ "$CARGO_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "apps/desktop/src-tauri/Cargo.toml version mismatch: $CARGO_VERSION != $EXPECTED_VERSION"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Quality gates (desktop)
        run: |
          bun run --filter @teak/desktop typecheck
          bun run --filter @teak/desktop test

      - name: Materialize App Store Connect key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          APPLE_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          echo "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" | base64 -d > "$APPLE_KEY_PATH"
          chmod 600 "$APPLE_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$APPLE_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build and publish GitHub release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_WEB_URL: ${{ secrets.VITE_WEB_URL }}
          VITE_PUBLIC_CONVEX_URL: ${{ secrets.VITE_PUBLIC_CONVEX_URL }}
          VITE_PUBLIC_CONVEX_SITE_URL: ${{ secrets.VITE_PUBLIC_CONVEX_SITE_URL }}
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: Teak Desktop ${{ steps.release.outputs.tag }}
          releaseBody: |
            ## Teak Desktop ${{ steps.release.outputs.tag }}

            - Signed + notarized macOS Apple Silicon build
            - Direct download DMG
            - In-app updater artifacts published
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Post-build signing checks
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Teak.app"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "Missing bundle: $APP_PATH"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute -vv "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Build updater metadata payload
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          RELEASE_VERSION="${{ steps.release.outputs.version }}"

          RELEASE_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          BUNDLE_URL="$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | endswith(".app.tar.gz")) | .browser_download_url][0] // empty')"
          SIGNATURE_URL="$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | endswith(".app.tar.gz.sig")) | .browser_download_url][0] // empty')"
          PUBLISHED_AT="$(echo "$RELEASE_JSON" | jq -r '.published_at // empty')"
          RELEASE_NOTES="$(echo "$RELEASE_JSON" | jq -r '.body // ""')"

          if [[ -z "$BUNDLE_URL" || -z "$SIGNATURE_URL" ]]; then
            echo "Unable to locate updater artifacts on GitHub release ${RELEASE_TAG}"
            exit 1
          fi

          SIGNATURE="$(curl -fsSL "$SIGNATURE_URL" | tr -d '\n')"
          METADATA_PATH="$RUNNER_TEMP/desktop-updater-metadata.json"

          jq -n \
            --arg version "$RELEASE_VERSION" \
            --arg notes "$RELEASE_NOTES" \
            --arg pub_date "$PUBLISHED_AT" \
            --arg url "$BUNDLE_URL" \
            --arg signature "$SIGNATURE" \
            '{version: $version, notes: $notes, pub_date: $pub_date, url: $url, signature: $signature}' > "$METADATA_PATH"

          echo "path=$METADATA_PATH" >> "$GITHUB_OUTPUT"

      - name: Commit updater metadata into apps/updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METADATA_PATH: ${{ steps.metadata.outputs.path }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          RELEASES_JSON="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName,isDraft,isPrerelease)"
          VERSION_LIST="$(echo "$RELEASES_JSON" | jq -r '[.[] | select((.isDraft | not) and (.isPrerelease | not) and (.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+([-.][0-9A-Za-z.-]+)?$"))) | .tagName | ltrimstr("v")] | unique | .[]')"

          UPDATES_PATH="apps/updates/darwin/aarch64"
          mkdir -p "$UPDATES_PATH"

          cp "$METADATA_PATH" "$UPDATES_PATH/latest.json"
          cp "$METADATA_PATH" "$UPDATES_PATH/$RELEASE_VERSION.json"

          while IFS= read -r CURRENT_VERSION; do
            if [[ -z "$CURRENT_VERSION" ]]; then
              continue
            fi
            cp "$METADATA_PATH" "$UPDATES_PATH/$CURRENT_VERSION.json"
          done <<< "$VERSION_LIST"

          jq -e '.version and .url and .signature' "$UPDATES_PATH/latest.json" > /dev/null
          jq -e '.version and .url and .signature' "$UPDATES_PATH/$RELEASE_VERSION.json" > /dev/null

          git add "$UPDATES_PATH"
          if git diff --cached --quiet; then
            echo "Updater metadata unchanged; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(desktop): publish updater metadata for v$RELEASE_VERSION"
          git push origin "HEAD:$DEFAULT_BRANCH"
