name: Desktop Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-mac-arm64:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          VITE_WEB_URL: https://app.teakvault.com
          VITE_PUBLIC_CONVEX_URL: https://uncommon-ladybug-882.convex.cloud
          VITE_PUBLIC_CONVEX_SITE_URL: https://uncommon-ladybug-882.convex.site
        run: bun run build

      - name: Package and publish
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --arm64 --config electron-builder.config.ts --publish always
