name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if version already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          expected_asset="Teak-${version}-arm64.dmg"
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null | grep -qx "$expected_asset"; then
            echo "Release $TAG_NAME already contains $expected_asset — skipping desktop release."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.check.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Prepare Apple signing credentials
        if: steps.check.outputs.should_run == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_PUBLIC_SENTRY_DESKTOP_DSN: ${{ secrets.SENTRY_DESKTOP_DSN }}
          VITE_GIT_COMMIT_SHA: ${{ github.sha }}
        run: |
          missing=()
          for name in APPLE_API_KEY_ID APPLE_API_KEY_P8 APPLE_API_ISSUER CSC_KEY_PASSWORD CSC_LINK SENTRY_AUTH_TOKEN VITE_PUBLIC_SENTRY_DESKTOP_DSN VITE_GIT_COMMIT_SHA; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required desktop release secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"

          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Verify Sentry release configuration
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/desktop
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_GIT_COMMIT_SHA: ${{ github.sha }}
          VITE_PUBLIC_SENTRY_DESKTOP_DSN: ${{ secrets.SENTRY_DESKTOP_DSN }}
        run: bun run verify:sentry:release

      - name: Build Electron app
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/desktop
        env:
          VITE_WEB_URL: https://app.teakvault.com
          VITE_PUBLIC_CONVEX_URL: https://uncommon-ladybug-882.convex.cloud
          VITE_PUBLIC_CONVEX_SITE_URL: https://uncommon-ladybug-882.convex.site
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_DESKTOP_UPDATE_CHANNEL: stable
          VITE_GIT_COMMIT_SHA: ${{ github.sha }}
          VITE_PUBLIC_SENTRY_DESKTOP_DSN: ${{ secrets.SENTRY_DESKTOP_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
        run: bun run build

      - name: Verify and finalize desktop source maps
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/desktop
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: teakvault
          SENTRY_PROJECT: teak-desktop-prod
        run: |
          version="${GITHUB_REF_NAME#v}"
          SENTRY_RELEASE="teak-desktop@${version}+${GITHUB_SHA}"
          if find .vite -name '*.map' -print -quit | grep -q .; then
            echo "Source maps must be removed after successful Sentry upload." >&2
            exit 1
          fi
          while IFS= read -r bundle; do
            grep -q 'sentry-dbid-' "$bundle"
          done < <(find .vite/build -name '*.js' -type f)
          grep -R -q 'sentry-dbid-' .vite/renderer/main_window
          bunx sentry-cli releases finalize "$SENTRY_RELEASE"

      - name: Package signed and notarized app
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/desktop
        env:
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: npx electron-builder --mac --arm64 --config electron-builder.config.ts --publish never

      - name: Upload desktop native symbols
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/desktop
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: bunx sentry-cli debug-files upload --org teakvault --project teak-desktop-prod --include-sources release/mac-arm64/Teak.app

      - name: Verify macOS release artifacts
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/desktop
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          app_path="release/mac-arm64/Teak.app"
          codesign --verify --deep --strict --verbose=4 "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
          if find "$app_path" -name '*.map' -print -quit | grep -q .; then
            echo "Distributable app contains source maps." >&2
            exit 1
          fi
          test -f release/latest-mac.yml
          test -f "release/Teak-${version}-arm64.dmg"
          test -f "release/Teak-${version}-arm64-mac.zip"

      - name: Publish GitHub release assets
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          assets=(
            "release/latest-mac.yml"
            "release/Teak-${version}-arm64.dmg"
            "release/Teak-${version}-arm64.dmg.blockmap"
            "release/Teak-${version}-arm64-mac.zip"
            "release/Teak-${version}-arm64-mac.zip.blockmap"
          )

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --title "$version" --verify-tag
          fi
