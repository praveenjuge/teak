name: Desktop Auto Tag

on:
  push:
    branches:
      - main
    paths:
      - "apps/desktop/package.json"

permissions:
  contents: write

concurrency:
  group: desktop-auto-tag-main
  cancel-in-progress: false

jobs:
  tag-desktop-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version from package.json
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.version' apps/desktop/package.json)"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid desktop version in apps/desktop/package.json: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync tauri + cargo versions to package.json
        shell: bash
        run: |
          set -euo pipefail
          node apps/desktop/scripts/sync-desktop-version.mjs "${{ steps.version.outputs.version }}"

      - name: Commit version sync changes when needed
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          git add apps/desktop/package.json apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml

          if git diff --cached --quiet; then
            echo "Desktop manifests already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(desktop): sync manifests for v$VERSION"
          git push origin "HEAD:main"

      - name: Create and push desktop release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q "refs/tags/$RELEASE_TAG"; then
            echo "Tag already exists: $RELEASE_TAG"
            exit 0
          fi

          git fetch origin main
          git checkout -B main origin/main
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
