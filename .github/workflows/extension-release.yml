name: Extension Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: extension-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if version already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          expected_asset="teak-extension-${version}-chrome.zip"
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null | grep -qx "$expected_asset"; then
            echo "Release $TAG_NAME already contains $expected_asset — skipping extension release."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.check.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Verify extension version matches tag
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/extension
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag_version="${TAG_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag version ($tag_version) does not match apps/extension/package.json version ($pkg_version)." >&2
            echo "Bump every package.json in the monorepo to $tag_version before tagging." >&2
            exit 1
          fi

      - name: Build extension (Chrome, production)
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/extension
        env:
          VITE_WEB_URL: https://app.teakvault.com
          VITE_PUBLIC_CONVEX_URL: https://uncommon-ladybug-882.convex.cloud
          VITE_PUBLIC_CONVEX_SITE_URL: https://uncommon-ladybug-882.convex.site
        run: bun run zip

      - name: Locate built ZIP
        id: zip
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/extension
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          zip_path="$(ls .output/*-chrome.zip | head -n1)"
          if [ -z "$zip_path" ] || [ ! -f "$zip_path" ]; then
            echo "Could not find built Chrome zip under apps/extension/.output" >&2
            ls -la .output >&2 || true
            exit 1
          fi
          release_zip="teak-extension-${version}-chrome.zip"
          cp "$zip_path" ".output/${release_zip}"
          echo "zip_path=apps/extension/${zip_path}" >> "$GITHUB_OUTPUT"
          echo "release_zip_path=apps/extension/.output/${release_zip}" >> "$GITHUB_OUTPUT"
          echo "release_zip_name=${release_zip}" >> "$GITHUB_OUTPUT"

      - name: Verify Chrome Web Store credentials
        if: steps.check.outputs.should_run == 'true'
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          missing=()
          for name in CHROME_EXTENSION_ID CHROME_CLIENT_ID CHROME_CLIENT_SECRET CHROME_REFRESH_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Chrome Web Store secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Cancel any pending Chrome Web Store submission
        if: steps.check.outputs.should_run == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          # Exchange the refresh token for a short-lived access token.
          access_token="$(curl -sS --fail \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${CLIENT_ID}" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "refresh_token=${REFRESH_TOKEN}" \
            -d "grant_type=refresh_token" \
            https://oauth2.googleapis.com/token \
            | jq -r '.access_token')"

          if [ -z "$access_token" ] || [ "$access_token" = "null" ]; then
            echo "Failed to obtain Chrome Web Store access token." >&2
            exit 1
          fi

          # Attempt to cancel any in-review submission. Returns 200 with an
          # empty body on success, and a 4xx/5xx when there is nothing to
          # cancel (for example, the item is already published with no draft
          # in review). Either outcome is fine — we just want a clean slate
          # before uploading the next version.
          response="$(mktemp)"
          http_status="$(curl -sS \
            -o "$response" \
            -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${access_token}" \
            -H "Content-Length: 0" \
            "https://chromewebstore.googleapis.com/v2/publishers/me/items/${EXTENSION_ID}:cancelSubmission" || true)"

          if [ "$http_status" = "200" ]; then
            echo "Cancelled an existing pending Chrome Web Store submission."
          else
            echo "No pending submission to cancel (HTTP ${http_status}). Continuing."
            head -c 1000 "$response" || true
            echo
          fi

      - name: Upload and publish to Chrome Web Store
        if: steps.check.outputs.should_run == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx -y chrome-webstore-upload-cli@3 upload \
            --source "${{ steps.zip.outputs.release_zip_path }}" \
            --extension-id "$EXTENSION_ID"
          npx -y chrome-webstore-upload-cli@3 publish \
            --extension-id "$EXTENSION_ID"

      - name: Publish GitHub release asset
        if: steps.check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_ZIP: ${{ steps.zip.outputs.release_zip_path }}
        run: |
          version="${TAG_NAME#v}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$RELEASE_ZIP" --clobber
          else
            gh release create "$TAG_NAME" "$RELEASE_ZIP" --title "$version" --verify-tag
          fi
