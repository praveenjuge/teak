name: Desktop Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New semver for desktop (for example 1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync desktop versions
        run: bun run --filter @teak/desktop version:sync -- ${{ inputs.version }}

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(desktop): bump version to ${{ inputs.version }}"
          branch: "chore/desktop-version-${{ inputs.version }}"
          title: "chore(desktop): bump version to ${{ inputs.version }}"
          body: |
            ## Why
            - Prepare desktop manifests for release tag `${{ inputs.version }}`

            ## How
            - Sync `apps/desktop/package.json`
            - Sync `apps/desktop/src-tauri/tauri.conf.json`
            - Sync `apps/desktop/src-tauri/Cargo.toml`

            ## Tests
            - Version sync script completed in CI
          labels: |
            release
            desktop
