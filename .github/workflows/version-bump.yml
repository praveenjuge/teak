name: Version Bump

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

permissions:
  actions: write
  contents: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  tag-desktop-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Resolve version from root package.json
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.version' package.json)"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version in package.json: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync repository versions from root package.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { readdir, readFile, writeFile } from "node:fs/promises";
          import path from "node:path";

          const version = process.env.VERSION;
          const repoRoot = process.cwd();
          const workspaceRoots = ["apps", "packages"];

          const jsonTargets = [
            { path: "package.json", fieldPath: ["version"] },
            { path: "apps/mobile/app.json", fieldPath: ["expo", "version"] },
            { path: "apps/mobile/store.config.json", fieldPath: ["apple", "version"] },
            { path: "apps/desktop/src-tauri/tauri.conf.json", fieldPath: ["version"] },
            { path: "apps/raycast/package-lock.json", fieldPath: ["version"] },
            { path: "apps/raycast/package-lock.json", fieldPath: ["packages", "", "version"] },
          ];

          const setNestedValue = (object, fieldPath, value) => {
            let cursor = object;

            for (let index = 0; index < fieldPath.length - 1; index += 1) {
              const key = fieldPath[index];
              cursor[key] ??= {};
              cursor = cursor[key];
            }

            cursor[fieldPath.at(-1)] = value;
          };

          const updateJsonFile = async (relativePath, updater) => {
            const absolutePath = path.join(repoRoot, relativePath);
            const json = JSON.parse(await readFile(absolutePath, "utf8"));
            updater(json);
            await writeFile(absolutePath, `${JSON.stringify(json, null, 2)}\n`);
          };

          for (const target of jsonTargets) {
            await updateJsonFile(target.path, (json) => {
              setNestedValue(json, target.fieldPath, version);
            });
          }

          for (const workspaceRoot of workspaceRoots) {
            const absoluteWorkspaceRoot = path.join(repoRoot, workspaceRoot);
            const entries = await readdir(absoluteWorkspaceRoot, { withFileTypes: true });

            for (const entry of entries) {
              if (!entry.isDirectory()) {
                continue;
              }

              const packageJsonPath = path.join(workspaceRoot, entry.name, "package.json");
              await updateJsonFile(packageJsonPath, (json) => {
                json.version = version;
              });
            }
          }

          const cargoTomlPath = path.join(repoRoot, "apps/desktop/src-tauri/Cargo.toml");
          const cargoToml = await readFile(cargoTomlPath, "utf8");
          const nextCargoToml = cargoToml.replace(
            /(\[package\][\s\S]*?^version\s*=\s*")[^"]+(".*$)/m,
            `$1${version}$2`
          );

          if (nextCargoToml === cargoToml) {
            throw new Error("Unable to update apps/desktop/src-tauri/Cargo.toml version");
          }

          await writeFile(cargoTomlPath, nextCargoToml);

          const wxtConfigPath = path.join(repoRoot, "apps/extension/wxt.config.ts");
          const wxtConfig = await readFile(wxtConfigPath, "utf8");
          const nextWxtConfig = wxtConfig.replace(
            /(\bmanifest:\s*\{[\s\S]*?\bversion:\s*")[^"]+(")/m,
            `$1${version}$2`
          );

          if (nextWxtConfig === wxtConfig) {
            throw new Error("Unable to update apps/extension/wxt.config.ts manifest version");
          }

          await writeFile(wxtConfigPath, nextWxtConfig);
          NODE

          bun install --lockfile-only --ignore-scripts

      - name: Commit version sync changes when needed
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          git add package.json bun.lock apps/*/package.json packages/*/package.json
          git add apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml
          git add apps/mobile/app.json apps/mobile/store.config.json
          git add apps/extension/wxt.config.ts apps/raycast/package-lock.json

          if git diff --cached --quiet; then
            echo "Repository version manifests already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(version): sync repository manifests for v$VERSION"
          git push origin "HEAD:main"

      - name: Create and push desktop release tag
        id: tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q "refs/tags/$RELEASE_TAG"; then
            echo "Tag already exists: $RELEASE_TAG"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main
          git checkout -B main origin/main
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch desktop release workflow
        if: steps.tag.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/desktop-release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"$RELEASE_TAG\"}}"
